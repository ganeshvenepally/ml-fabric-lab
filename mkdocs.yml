site_name: Arista EVPN/VXLAN Containerlab Lab
site_description: Deep documentation for the VXLAN/EVPN fabric, staged deployment workflow, and validation procedures.

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Topologies:
      - Fabric Lab: fabric.md
      - Management Lab: mgmt.md
  - Deep Dives:
      - EVPN Control Plane: evpn-control-plane.md
      - Traffic Visibility: ntopng.md
  - Operations:
      - Deploy & Destroy: operations.md
      - Validation & Testing: validation.md
      - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search

extra_css:
  - styles/extra.css
